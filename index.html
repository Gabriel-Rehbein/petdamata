<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pet da Mata — Pet Shop</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <div class="wrap header__bar">
    <div class="brand">
      <div class="brand__logo" aria-hidden="true">🐾</div>
      <div class="brand__txt">
        <h1>Pet da Mata</h1>
        <p>Sistema do Pet Shop • Cadastro & Atendimento</p>
      </div>
    </div>

    <div class="header__actions">
      <div class="searchBox">
        <input id="q" class="searchBox__input" placeholder="Buscar por pet, raça, dono, telefone..." />
        <span class="searchBox__icon">🔎</span>
      </div>

      <button id="exportBtn" class="btn btn--soft" type="button">Exportar</button>

      <label class="btn btn--soft fileBtn">
        Importar
        <input id="importInput" type="file" accept="application/json" hidden>
      </label>

      <button id="wipeBtn" class="btn btn--danger" type="button">Limpar</button>
    </div>
  </div>
</header>

<main class="wrap grid">

  <!-- FORM -->
  <section class="card">
    <div class="card__top">
      <div class="pill" id="modePill">Modo: Novo</div>
      <div class="pill pill--count">🐶 Pet</div>
    </div>

    <form id="form" class="form">
      <h3 class="form__title">Cadastro do Pet</h3>

      <div class="form__group">
        <label class="label" for="pet_nome">Nome do pet *</label>
        <input id="pet_nome" placeholder="Ex: Thor" required>
      </div>

      <div class="form__group">
        <label class="label" for="pet_raca">Raça *</label>
        <input id="pet_raca" placeholder="Ex: Shih Tzu" required>
      </div>

      <div class="row2">
        <div class="form__group">
          <label class="label" for="pet_idade">Idade</label>
          <input id="pet_idade" type="number" min="0" placeholder="Ex: 3">
        </div>

        <div class="form__group">
          <label class="label" for="pet_sexo">Sexo</label>
          <select id="pet_sexo">
            <option value="">Selecione</option>
            <option value="M">M</option>
            <option value="F">F</option>
          </select>
        </div>
      </div>

      <div class="row2">
        <div class="form__group">
          <label class="label" for="pet_peso">Peso (kg)</label>
          <input id="pet_peso" type="number" step="0.01" min="0" placeholder="Ex: 7.50">
        </div>

        <div class="form__group">
          <label class="label" for="pet_tipo">Tipo</label>
          <select id="pet_tipo">
            <option value="">Selecione</option>
            <option value="Cão">Cão</option>
            <option value="Gato">Gato</option>
            <option value="Coelho">Coelho</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
      </div>

      <hr class="sep">

      <h3 class="form__title">Dados do Cliente</h3>

      <div class="form__group">
        <label class="label" for="dono_nome">Nome do dono *</label>
        <input id="dono_nome" placeholder="Ex: Maria Souza" required>
      </div>

      <div class="row2">
        <div class="form__group">
          <label class="label" for="dono_tel">Telefone *</label>
          <input id="dono_tel" placeholder="(51) 99999-9999" required>
        </div>

        <div class="form__group">
          <label class="label" for="dono_obs">Observações</label>
          <input id="dono_obs" placeholder="Ex: alérgico a shampoo X">
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn--primary">Salvar</button>
        <button type="button" id="cancelBtn" class="btn btn--soft">Cancelar</button>
      </div>

      <p class="hint">* Campos obrigatórios</p>
    </form>
  </section>

  <!-- LIST -->
  <section class="card">
    <div class="toprow">
      <div>
        <h3 class="title">Registros</h3>
        <p class="subtitle">Clique no nome do pet para ver detalhes</p>
      </div>
      <span class="pill pill--count" id="countPill">0</span>
    </div>

    <div id="listWrap" class="listWrap"></div>

    <!-- DETALHES -->
    <aside id="detailsPanel" class="details hidden" aria-live="polite">
      <div class="detailsHeader">
        <strong id="detailsTitle">Detalhes</strong>
        <button id="closeDetails" class="btn btn--ghost" type="button">Fechar</button>
      </div>
      <div class="detailsBody" id="detailsBody"></div>
    </aside>
  </section>

</main>

<footer class="footer">
  <div class="wrap footer__in">
    <div>
      Instagram da Pet:
      <a href="https://instagram.com/petdamatapoa" target="_blank" rel="noopener">@petdamatapoa</a>
    </div>
    <div class="footer__by">Feito por Gabriel (@gabinhomr)</div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
